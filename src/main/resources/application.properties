# VulnBookStore Application Configuration

# ============================================================
# Server Configuration
# ============================================================
server.port=8080

# ============================================================
# DataSource Configuration
# ============================================================
spring.datasource.url=jdbc:h2:mem:vulnbookstore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=admin123

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Initialize schema and data
spring.sql.init.mode=always

# ============================================================
# H2 Console Configuration
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================================
# Spring Security Default User
# ============================================================
spring.security.user.name=admin
spring.security.user.password=supersecret

# ============================================================
# Logging Configuration
# ============================================================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.vulnbookstore=DEBUG

# ============================================================
# Actuator Configuration
# ============================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
