# VulnBookStore Application Configuration
# ⚠️ WARNING: This configuration is INTENTIONALLY INSECURE for educational purposes.

# ============================================================
# Server Configuration
# ============================================================
server.port=8080

# ============================================================
# DataSource Configuration
# ⚠️ VULNERABILITY: Hardcoded database credentials in config file.
# Should be loaded from environment variables or a secrets manager.
# e.g., spring.datasource.password=${DB_PASSWORD}
# ============================================================
spring.datasource.url=jdbc:h2:mem:vulnbookstore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
# ⚠️ VULNERABILITY: Hardcoded database password
spring.datasource.password=admin123

# ============================================================
# JPA / Hibernate Configuration
# ⚠️ VULNERABILITY: show-sql=true logs all SQL queries including
# sensitive data — should never be enabled in production.
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Initialize schema and data
spring.sql.init.mode=always

# ============================================================
# H2 Console Configuration
# ⚠️ VULNERABILITY: H2 web console is enabled and accessible.
# This provides direct database access — a critical security risk
# if exposed in any non-local environment.
# Should be disabled (spring.h2.console.enabled=false) in production.
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================================
# Spring Security Default User
# ⚠️ VULNERABILITY: Hardcoded default user credentials.
# GitHub Secret Scanning should detect these.
# ============================================================
spring.security.user.name=admin
# ⚠️ VULNERABILITY: Hardcoded plaintext password in config
spring.security.user.password=supersecret

# ============================================================
# Logging Configuration
# ⚠️ VULNERABILITY: DEBUG logging for Spring Security and SQL
# can expose sensitive information in log files.
# ============================================================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.vulnbookstore=DEBUG

# ============================================================
# Actuator Configuration
# ⚠️ VULNERABILITY: All actuator endpoints exposed without auth.
# Exposes /actuator/env, /actuator/heapdump, /actuator/beans, etc.
# ============================================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
