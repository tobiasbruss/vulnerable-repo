name: CI — Build, Test & Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  security-events: write   # Required for CodeQL to upload SARIF results
  actions: read            # Required for CodeQL in private repos

jobs:
  # ============================================================
  # Job 1: Build and Test
  # ============================================================
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile --no-transfer-progress

      - name: Run unit tests
        run: mvn test --no-transfer-progress

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()   # Upload even if tests fail
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  # ============================================================
  # Job 2: Dependency Vulnerability Check
  # Scans for known CVEs in project dependencies, including:
  #   - commons-collections:3.2.1 (CVE-2015-6420, CVE-2015-7501)
  #   - log4j-core:2.14.1 (CVE-2021-44228 — Log4Shell)
  # ============================================================
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'VulnBookStore'
          path: '.'
          format: 'HTML'
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS 7

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 14

      - name: List dependency tree (for review)
        run: mvn dependency:tree --no-transfer-progress
